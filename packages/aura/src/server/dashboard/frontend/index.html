<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
    --fg: #f1f5f9; --fg2: #94a3b8;
    --green: #22c55e; --red: #ef4444; --blue: #3b82f6; --yellow: #eab308;
    --border: #334155; --radius: 8px;
  }
  body { font-family: ui-monospace, monospace; background: var(--bg); color: var(--fg); font-size: 14px; }
  header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 24px; }
  header h1 { font-size: 18px; font-weight: 600; }
  nav { display: flex; gap: 12px; }
  nav a { color: var(--fg2); text-decoration: none; padding: 4px 12px; border-radius: var(--radius); cursor: pointer; }
  nav a:hover, nav a.active { color: var(--fg); background: var(--bg3); }
  main { padding: 24px; max-width: 1200px; margin: 0 auto; }
  .page { display: none; }
  .page.active { display: block; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); }
  th { color: var(--fg2); font-size: 12px; text-transform: uppercase; letter-spacing: .05em; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 12px; }
  .badge.query { background: #1e3a5f; color: var(--blue); }
  .badge.mutation { background: #1a3a2a; color: var(--green); }
  .badge.action { background: #3a2a1a; color: var(--yellow); }
  .badge.success { background: #1a3a2a; color: var(--green); }
  .badge.error { background: #3a1a1a; color: var(--red); }
  .btn { padding: 6px 16px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg2); color: var(--fg); cursor: pointer; }
  .btn:hover { background: var(--bg3); }
  .btn.primary { background: var(--blue); border-color: var(--blue); }
  .log-entry { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .log-entry:hover { background: var(--bg2); }
  .log-entry .time { color: var(--fg2); }
  .log-entry .error-line { color: var(--red); }
  .log-entry .success-line { color: var(--green); }
  textarea, input[type="text"] { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg2); color: var(--fg); font-family: inherit; font-size: 13px; }
  textarea:focus, input:focus { outline: none; border-color: var(--blue); }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .card h3 { font-size: 13px; color: var(--fg2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
  .card .value { font-size: 28px; font-weight: 700; }
  .mb-4 { margin-bottom: 16px; }
  .mt-4 { margin-top: 16px; }
  .flex { display: flex; gap: 8px; align-items: center; }
  pre { background: var(--bg); padding: 12px; border-radius: var(--radius); overflow-x: auto; font-size: 13px; }
</style>
</head>
<body>
<header>
  <h1>&#x25B4; Aura Dashboard</h1>
  <nav>
    <a class="active" data-page="logs">Logs</a>
    <a data-page="functions">Functions</a>
    <a data-page="errors">Errors</a>
    <a data-page="metrics">Metrics</a>
  </nav>
</header>
<main>
  <div id="page-logs" class="page active">
    <div class="flex mb-4">
      <input type="text" id="log-filter" placeholder="Filter by function name..." style="flex:1">
      <select id="log-status" style="padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--fg)">
        <option value="">All</option>
        <option value="success">Success</option>
        <option value="error">Error</option>
      </select>
      <button class="btn" onclick="loadLogs()">Refresh</button>
    </div>
    <div id="log-list"></div>
  </div>
  <div id="page-functions" class="page">
    <div id="function-list"></div>
  </div>
  <div id="page-errors" class="page">
    <div id="error-list"></div>
  </div>
  <div id="page-metrics" class="page">
    <div id="metrics-grid" class="grid-2"></div>
  </div>
</main>

<script>
const API = "/dashboard/api";

// Navigation
document.querySelectorAll("nav a").forEach(a => {
  a.onclick = () => {
    document.querySelectorAll("nav a").forEach(x => x.classList.remove("active"));
    a.classList.add("active");
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById("page-" + a.dataset.page).classList.add("active");
    if (a.dataset.page === "logs") loadLogs();
    if (a.dataset.page === "functions") loadFunctions();
    if (a.dataset.page === "errors") loadErrors();
    if (a.dataset.page === "metrics") loadMetrics();
  };
});

async function apiFetch(path) {
  const res = await fetch(API + path);
  return res.json();
}

// ─── Logs ────────────────────────────────────────────────
async function loadLogs() {
  const name = document.getElementById("log-filter").value;
  const status = document.getElementById("log-status").value;
  let url = "/logs?limit=200";
  if (name) url += "&name=" + encodeURIComponent(name);
  if (status) url += "&status=" + status;
  const data = await apiFetch(url);
  const list = document.getElementById("log-list");
  list.innerHTML = data.logs.map(l => {
    const cls = l.status === "error" ? "error-line" : "success-line";
    return `<div class="log-entry">
      <div class="flex">
        <span class="time">${new Date(l.timestamp).toLocaleTimeString()}</span>
        <span class="badge ${l.type}">${l.type}</span>
        <span class="badge ${l.status}">${l.status}</span>
        <strong>${l.name}</strong>
        <span class="fg2">${l.durationMs.toFixed(0)}ms</span>
      </div>
      ${l.error ? `<div class="${cls}">${escapeHtml(l.error)}</div>` : ""}
      ${l.consoleLogs.length ? `<div style="font-size:12px;color:var(--fg2);margin-top:4px">${l.consoleLogs.map(cl => `[${cl.level}] ${escapeHtml(cl.message)}`).join("<br>")}</div>` : ""}
    </div>`;
  }).join("");
}

document.getElementById("log-filter").oninput = debounce(loadLogs, 300);
document.getElementById("log-status").onchange = loadLogs;

// ─── Functions ───────────────────────────────────────────
async function loadFunctions() {
  const data = await apiFetch("/functions");
  const list = document.getElementById("function-list");
  list.innerHTML = `<table>
    <thead><tr><th>Name</th><th>Type</th><th>1m invocations</th><th>1m errors</th><th>Avg latency</th><th>P99</th><th></th></tr></thead>
    <tbody>${data.functions.map(f => `<tr>
      <td><strong>${f.name}</strong></td>
      <td><span class="badge ${f.type}">${f.type}</span></td>
      <td>${f.metrics.invocations1m}</td>
      <td>${f.metrics.errors1m}</td>
      <td>${f.metrics.avgLatency1m.toFixed(0)}ms</td>
      <td>${f.metrics.p99Latency1m.toFixed(0)}ms</td>
      <td><button class="btn" onclick="runFunction('${f.name}')">Run</button></td>
    </tr>`).join("")}</tbody>
  </table>`;
}

let runFunctionName = "";
async function runFunction(name) {
  runFunctionName = name;
  const input = prompt("Enter JSON input for " + name + ":");
  if (input === null) return;
  let parsed;
  try { parsed = JSON.parse(input || "{}"); } catch { alert("Invalid JSON"); return; }
  const res = await fetch(API + "/functions/" + encodeURIComponent(name) + "/run", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(parsed),
  });
  const result = await res.json();
  alert(JSON.stringify(result, null, 2));
}

// ─── Errors ──────────────────────────────────────────────
async function loadErrors() {
  const data = await apiFetch("/errors");
  const list = document.getElementById("error-list");
  list.innerHTML = data.errors.length === 0
    ? "<p style='color:var(--green)'>No errors in recent window.</p>"
    : data.errors.map(e => `<div class="log-entry">
      <div class="flex">
        <span class="time">${new Date(e.timestamp).toLocaleTimeString()}</span>
        <span class="badge ${e.type}">${e.type}</span>
        <strong>${e.name}</strong>
        <span class="fg2">${e.durationMs.toFixed(0)}ms</span>
      </div>
      <div class="error-line">${escapeHtml(e.error || "Unknown error")}</div>
    </div>`).join("");
}

// ─── Metrics ─────────────────────────────────────────────
async function loadMetrics() {
  const data = await apiFetch("/metrics");
  const grid = document.getElementById("metrics-grid");
  const entries = Object.entries(data.metrics);
  if (entries.length === 0) {
    grid.innerHTML = "<p>No metrics yet.</p>";
    return;
  }
  grid.innerHTML = entries.map(([name, m]) => `<div class="card">
    <h3>${name}</h3>
    <div class="grid-2" style="margin-top:8px">
      <div><span style="color:var(--fg2)">Invocations</span><div class="value">${m.invocations1m}</div></div>
      <div><span style="color:var(--fg2)">Errors</span><div class="value" style="color:var(--red)">${m.errors1m}</div></div>
      <div><span style="color:var(--fg2)">Avg</span><div class="value">${m.avgLatency1m.toFixed(0)}ms</div></div>
      <div><span style="color:var(--fg2)">P99</span><div class="value">${m.p99Latency1m.toFixed(0)}ms</div></div>
      <div><span style="color:var(--fg2)">P50</span><div class="value">${m.p50Latency1m.toFixed(0)}ms</div></div>
      <div><span style="color:var(--fg2)">P90</span><div class="value">${m.p90Latency1m.toFixed(0)}ms</div></div>
    </div>
  </div>`).join("");
}

// ─── Utils ───────────────────────────────────────────────
function escapeHtml(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

function debounce(fn, ms) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
}

// Initial load
loadLogs();
setInterval(loadLogs, 2000);
</script>
</body>
</html>
