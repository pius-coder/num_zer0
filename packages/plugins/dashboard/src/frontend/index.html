<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
    --fg: #f1f5f9; --fg2: #94a3b8;
    --green: #22c55e; --red: #ef4444; --blue: #3b82f6; --yellow: #eab308; --purple: #a855f7;
    --border: #334155; --radius: 8px;
  }
  body { font-family: ui-monospace, monospace; background: var(--bg); color: var(--fg); font-size: 14px; }
  header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 24px; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 18px; font-weight: 600; cursor: pointer; }
  nav { display: flex; gap: 12px; }
  nav a { color: var(--fg2); text-decoration: none; padding: 4px 12px; border-radius: var(--radius); cursor: pointer; }
  nav a:hover, nav a.active { color: var(--fg); background: var(--bg3); }
  main { padding: 24px; max-width: 1400px; margin: 0 auto; }
  .page { display: none; }
  .page.active { display: block; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); }
  th { color: var(--fg2); font-size: 12px; text-transform: uppercase; letter-spacing: .05em; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 12px; font-weight: 600; }
  .badge.query { background: #1e3a5f; color: var(--blue); }
  .badge.mutation { background: #1a3a2a; color: var(--green); }
  .badge.action { background: #3a2a1a; color: var(--yellow); }
  .badge.success { background: #1a3a2a; color: var(--green); }
  .badge.error { background: #3a1a1a; color: var(--red); }
  .badge.info { background: #1e293b; color: var(--blue); }
  .badge.warn { background: #3a2a1a; color: var(--yellow); }
  .btn { padding: 6px 16px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg2); color: var(--fg); cursor: pointer; font-size: 13px; }
  .btn:hover { background: var(--bg3); }
  .btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
  .btn.danger { background: var(--red); border-color: var(--red); color: #fff; }
  .btn.sm { padding: 4px 10px; font-size: 12px; }
  .log-entry { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 13px; cursor: pointer; }
  .log-entry:hover { background: var(--bg2); }
  .log-entry .time { color: var(--fg2); font-size: 12px; }
  .log-entry .error-line { color: var(--red); white-space: pre-wrap; word-break: break-all; font-size: 12px; max-height: 60px; overflow: hidden; }
  .log-entry .error-line.expanded { max-height: none; }
  .log-entry .success-line { color: var(--green); }
  textarea, input[type="text"], select { padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg2); color: var(--fg); font-family: inherit; font-size: 13px; }
  textarea:focus, input:focus, select:focus { outline: none; border-color: var(--blue); }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .card h3 { font-size: 13px; color: var(--fg2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
  .card .value { font-size: 28px; font-weight: 700; }
  .mb-4 { margin-bottom: 16px; }
  .mt-4 { margin-top: 16px; }
  .flex { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  pre { background: var(--bg); padding: 12px; border-radius: var(--radius); overflow-x: auto; font-size: 13px; max-height: 400px; overflow-y: auto; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; max-width: 700px; width: 90%; max-height: 80vh; overflow-y: auto; }
  .modal h2 { margin-bottom: 16px; }
  .chart-container { position: relative; height: 200px; }
  .empty-state { color: var(--fg2); text-align: center; padding: 48px; }
  .request-id { font-size: 11px; color: var(--fg2); background: var(--bg3); padding: 2px 6px; border-radius: 4px; cursor: pointer; }
  .request-id:hover { background: var(--border); }
  .truncate { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .detail-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; }
  .detail-card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
  .detail-card-body { padding: 16px; display: none; }
  .detail-card-body.open { display: block; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; background: var(--bg3); color: var(--fg2); }
  .sidebar-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 16px; }
  @media (max-width: 768px) { .sidebar-layout { grid-template-columns: 1fr; } .grid-2, .grid-3 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <h1 onclick="showPage('logs')">&#x25B4; Aura Dashboard</h1>
  <nav>
    <a class="active" data-page="logs">Logs</a>
    <a data-page="functions">Functions</a>
    <a data-page="metrics">Metrics</a>
    <a data-page="errors">Errors</a>
  </nav>
</header>
<main>
  <!-- Logs -->
  <div id="page-logs" class="page active">
    <div class="flex mb-4">
      <input type="text" id="log-filter" placeholder="Filter by function..." style="flex:1">
      <select id="log-status">
        <option value="">All status</option>
        <option value="success">Success</option>
        <option value="error">Error</option>
      </select>
      <input type="text" id="log-request-id" placeholder="Request ID..." style="width:180px">
      <button class="btn primary sm" onclick="loadLogs()">Refresh</button>
    </div>
    <div id="log-count" class="mb-4" style="color:var(--fg2);font-size:12px"></div>
    <div id="log-list"></div>
  </div>

  <!-- Functions -->
  <div id="page-functions" class="page">
    <div id="function-list"></div>
    <div id="function-detail" style="display:none" class="mt-4"></div>
  </div>

  <!-- Metrics -->
  <div id="page-metrics" class="page">
    <div id="metrics-grid" class="grid-3 mb-4"></div>
    <div id="metrics-charts" class="grid-2"></div>
  </div>

  <!-- Errors -->
  <div id="page-errors" class="page">
    <div id="error-summary" class="grid-3 mb-4"></div>
    <div id="error-chart" class="card mb-4"><h3>Error frequency (last 60 min)</h3><div class="chart-container"><canvas id="errorFreqChart"></canvas></div></div>
    <div id="error-list"></div>
  </div>
</main>

<!-- Run Function Modal -->
<div id="run-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeRunModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>Run Function: <span id="run-fn-name"></span></h2>
    <div class="mb-4">
      <label style="display:block;color:var(--fg2);font-size:12px;margin-bottom:4px">Input JSON</label>
      <textarea id="run-input" rows="6" style="width:100%;font-family:monospace">{}</textarea>
    </div>
    <div class="flex mb-4">
      <button class="btn primary" onclick="executeRun()">Execute</button>
      <button class="btn" onclick="closeRunModal()">Cancel</button>
    </div>
    <div id="run-result" style="display:none">
      <label style="display:block;color:var(--fg2);font-size:12px;margin-bottom:4px">Result</label>
      <pre id="run-result-content"></pre>
    </div>
  </div>
</div>

<!-- Request ID Modal -->
<div id="request-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeRequestModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>Request: <span id="request-id-display" style="font-size:14px;color:var(--fg2)"></span></h2>
    <div id="request-logs"></div>
  </div>
</div>

<script>
const API = "/dashboard/api";

// ─── Navigation ─────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll("nav a").forEach(x => x.classList.remove("active"));
  document.querySelector(`nav a[data-page="${name}"]`).classList.add("active");
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("page-" + name).classList.add("active");
  if (name === "logs") loadLogs();
  if (name === "functions") loadFunctions();
  if (name === "errors") { loadErrors(); renderErrorChart(); }
  if (name === "metrics") { loadMetrics(); renderMetricCharts(); }
}

document.querySelectorAll("nav a").forEach(a => {
  a.onclick = () => showPage(a.dataset.page);
});

async function apiFetch(path) {
  const res = await fetch(API + path);
  if (!res.ok) return null;
  return res.json();
}

function escapeHtml(str) {
  if (str == null) return "";
  const d = document.createElement("div");
  d.textContent = String(str);
  return d.innerHTML;
}

function debounce(fn, ms) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
}

function timeAgo(d) {
  const s = Math.floor((Date.now() - new Date(d).getTime()) / 1000);
  if (s < 60) return s + "s ago";
  if (s < 3600) return Math.floor(s / 60) + "m ago";
  return Math.floor(s / 3600) + "h ago";
}

// ─── Logs ────────────────────────────────────────────────
let logsData = [];

async function loadLogs() {
  const name = document.getElementById("log-filter").value;
  const status = document.getElementById("log-status").value;
  const requestId = document.getElementById("log-request-id").value;
  let url = "/logs?limit=500";
  if (name) url += "&name=" + encodeURIComponent(name);
  if (status) url += "&status=" + status;
  if (requestId) url += "&requestId=" + encodeURIComponent(requestId);
  const data = await apiFetch(url);
  if (!data) return;
  logsData = data.logs;
  renderLogs(logsData);
}

function renderLogs(logs) {
  document.getElementById("log-count").textContent = logs.length + " events";
  const list = document.getElementById("log-list");
  list.innerHTML = logs.slice().reverse().map(l => {
    const cls = l.status === "error" ? "error-line" : "success-line";
    const errorPreview = l.error ? l.error.slice(0, 200) : "";
    return `<div class="log-entry" onclick="showRequestModal('${escapeHtml(l.requestId)}')">
      <div class="flex" style="justify-content:space-between">
        <div class="flex">
          <span class="time">${new Date(l.timestamp).toLocaleTimeString()}</span>
          <span class="badge ${l.type}">${l.type}</span>
          <span class="badge ${l.status}">${l.status}</span>
          <strong class="truncate" title="${escapeHtml(l.name)}">${escapeHtml(l.name)}</strong>
          <span style="color:var(--fg2)">${l.durationMs.toFixed(0)}ms</span>
        </div>
        <span class="request-id" title="${escapeHtml(l.requestId)}">${l.requestId.slice(0, 8)}…</span>
      </div>
      ${l.error ? `<div class="${cls}">${escapeHtml(errorPreview)}${l.error.length > 200 ? '…' : ''}</div>` : ""}
      ${l.consoleLogs && l.consoleLogs.length ? `<div style="font-size:12px;color:var(--fg2);margin-top:4px">${l.consoleLogs.slice(0, 3).map(cl => `<span class="badge ${cl.level}">${cl.level}</span> ${escapeHtml(cl.message.slice(0, 100))}`).join("<br>")}${l.consoleLogs.length > 3 ? `<br>… +${l.consoleLogs.length - 3} more` : ""}</div>` : ""}
    </div>`;
  }).join("");
}

document.getElementById("log-filter").oninput = debounce(loadLogs, 300);
document.getElementById("log-status").onchange = loadLogs;
document.getElementById("log-request-id").oninput = debounce(loadLogs, 300);

// ─── Request ID Modal ───────────────────────────────────
function showRequestModal(requestId) {
  document.getElementById("request-id-display").textContent = requestId;
  const matching = logsData.filter(l => l.requestId === requestId);
  const list = document.getElementById("request-logs");
  list.innerHTML = matching.map(l => {
    return `<div class="log-entry" style="cursor:default">
      <div class="flex">
        <span class="time">${new Date(l.timestamp).toLocaleTimeString()}</span>
        <span class="badge ${l.type}">${l.type}</span>
        <span class="badge ${l.status}">${l.status}</span>
        <strong>${escapeHtml(l.name)}</strong>
        <span style="color:var(--fg2)">${l.durationMs.toFixed(0)}ms</span>
      </div>
      ${l.error ? `<div class="error-line">${escapeHtml(l.error)}</div>` : ""}
      ${l.consoleLogs && l.consoleLogs.length ? `<div style="font-size:12px;color:var(--fg2);margin-top:4px">${l.consoleLogs.map(cl => `[${cl.level}] ${escapeHtml(cl.message)}`).join("<br>")}</div>` : ""}
      
    </div>`;
  }).join("");
  document.getElementById("request-modal").style.display = "flex";
}

function closeRequestModal() {
  document.getElementById("request-modal").style.display = "none";
}

// ─── Functions ───────────────────────────────────────────
let functionsData = [];
let selectedFunction = null;

async function loadFunctions() {
  const data = await apiFetch("/functions");
  if (!data) return;
  functionsData = data.functions;
  const list = document.getElementById("function-list");
  list.innerHTML = `<div class="sidebar-layout">
    <div class="card">
      <h3>Functions (${data.functions.length})</h3>
      <div style="margin-top:8px">${data.functions.map(f => `<div class="log-entry" onclick="selectFunction('${escapeHtml(f.name)}')" style="${selectedFunction === f.name ? 'background:var(--bg3)' : ''}">
        <div class="flex" style="justify-content:space-between">
          <span class="truncate" style="flex:1">${escapeHtml(f.name)}</span>
          <span class="badge ${f.type}">${f.type}</span>
        </div>
        <div style="font-size:12px;color:var(--fg2);margin-top:2px">${f.metrics.invocations1m} calls · ${f.metrics.errors1m} err · ${f.metrics.avgLatency1m.toFixed(0)}ms avg</div>
      </div>`).join("")}</div>
    </div>
    <div id="function-detail-panel">
      ${selectedFunction ? renderFunctionDetail(selectedFunction) : '<div class="empty-state">Select a function to see details</div>'}
    </div>
  </div>`;
  if (selectedFunction) {
    document.querySelector(`[data-page="functions"]`).scrollIntoView({ behavior: "smooth" });
  }
}

function selectFunction(name) {
  selectedFunction = name;
  loadFunctions();
  loadFunctionDetail(name);
}

async function loadFunctionDetail(name) {
  const data = await apiFetch("/functions/" + encodeURIComponent(name));
  const history = await apiFetch("/functions/" + encodeURIComponent(name) + "/history");
  const panel = document.getElementById("function-detail-panel");
  if (!data) { panel.innerHTML = '<div class="empty-state">Function not found</div>'; return; }
  panel.innerHTML = `
    <div class="card mb-4">
      <div class="flex" style="justify-content:space-between">
        <div>
          <h2>${escapeHtml(data.name)}</h2>
          <span class="badge ${data.type}">${data.type}</span>
        </div>
        <button class="btn primary" onclick="openRunModal('${escapeHtml(data.name)}')">Run</button>
      </div>
    </div>
    <div class="grid-3 mb-4">
      <div class="card"><h3>Invocations (1m)</h3><div class="value">${data.metrics.invocations1m}</div></div>
      <div class="card"><h3>Errors (1m)</h3><div class="value" style="color:var(--red)">${data.metrics.errors1m}</div></div>
      <div class="card"><h3>Avg Latency</h3><div class="value">${data.metrics.avgLatency1m.toFixed(0)}ms</div></div>
      <div class="card"><h3>P50</h3><div class="value">${data.metrics.p50Latency1m.toFixed(0)}ms</div></div>
      <div class="card"><h3>P90</h3><div class="value">${data.metrics.p90Latency1m.toFixed(0)}ms</div></div>
      <div class="card"><h3>P99</h3><div class="value">${data.metrics.p99Latency1m.toFixed(0)}ms</div></div>
    </div>
    <div class="card mb-4">
      <h3>Recent Logs</h3>
      <div style="margin-top:8px">${data.logs.length === 0 ? '<div class="empty-state" style="padding:16px">No logs yet</div>' : data.logs.slice().reverse().map(l => `<div class="log-entry" style="cursor:pointer" onclick="showRequestModal('${escapeHtml(l.requestId)}')">
        <div class="flex">
          <span class="time">${new Date(l.timestamp).toLocaleTimeString()}</span>
          <span class="badge ${l.status}">${l.status}</span>
          <span style="color:var(--fg2)">${l.durationMs.toFixed(0)}ms</span>
          <span class="request-id">${l.requestId.slice(0, 8)}…</span>
        </div>
        ${l.error ? `<div class="error-line">${escapeHtml(l.error.slice(0, 200))}</div>` : ""}
      </div>`).join("")}</div>
    </div>
    <div class="card">
      <h3>Run History (from dashboard)</h3>
      <div style="margin-top:8px">${!history || history.runs.length === 0 ? '<div class="empty-state" style="padding:16px">No runs from dashboard yet</div>' : history.runs.map(r => `<div class="log-entry">
        <div class="flex">
          <span class="time">${new Date(r.timestamp).toLocaleTimeString()}</span>
          <span class="badge ${r.status === 200 ? 'success' : 'error'}">${r.status}</span>
          <pre style="flex:1;max-height:40px;overflow:hidden;font-size:12px">${escapeHtml(JSON.stringify(r.input, null, 1))}</pre>
        </div>
        <pre style="margin-top:4px;max-height:60px;overflow:hidden;font-size:12px">${escapeHtml(JSON.stringify(r.result, null, 1))}</pre>
      </div>`).join("")}</div>
    </div>`;
}

// ─── Run Function Modal ─────────────────────────────────
let currentRunFn = "";

function openRunModal(name) {
  currentRunFn = name;
  document.getElementById("run-fn-name").textContent = name;
  document.getElementById("run-input").value = "{}";
  document.getElementById("run-result").style.display = "none";
  document.getElementById("run-modal").style.display = "flex";
}

function closeRunModal() {
  document.getElementById("run-modal").style.display = "none";
}

async function executeRun() {
  const btn = document.querySelector("#run-modal .btn.primary");
  btn.disabled = true;
  btn.textContent = "Running…";
  let input;
  try {
    input = JSON.parse(document.getElementById("run-input").value);
  } catch {
    document.getElementById("run-result").style.display = "block";
    document.getElementById("run-result-content").textContent = "Invalid JSON";
    btn.disabled = false;
    btn.textContent = "Execute";
    return;
  }
  try {
    const res = await fetch(API + "/functions/" + encodeURIComponent(currentRunFn) + "/run", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(input),
    });
    const result = await res.json();
    document.getElementById("run-result").style.display = "block";
    document.getElementById("run-result-content").textContent = JSON.stringify(result, null, 2);
  } catch (err) {
    document.getElementById("run-result").style.display = "block";
    document.getElementById("run-result-content").textContent = "Error: " + err.message;
  }
  btn.disabled = false;
  btn.textContent = "Execute";
}

// ─── Metrics ─────────────────────────────────────────────
let metricsChartInstances = {};

async function loadMetrics() {
  const data = await apiFetch("/metrics");
  if (!data) return;
  const entries = Object.entries(data.metrics);
  const grid = document.getElementById("metrics-grid");
  if (entries.length === 0) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">No metrics yet.</div>';
    return;
  }
  grid.innerHTML = entries.map(([name, m]) => `<div class="card">
    <h3 title="${escapeHtml(name)}">${escapeHtml(name.length > 30 ? name.slice(0, 30) + '…' : name)}</h3>
    <div class="flex" style="justify-content:space-between;margin-top:8px">
      <div><span style="color:var(--fg2);font-size:12px">Calls</span><div class="value" style="font-size:20px">${m.invocations1m}</div></div>
      <div><span style="color:var(--fg2);font-size:12px">Errors</span><div class="value" style="font-size:20px;color:var(--red)">${m.errors1m}</div></div>
      <div><span style="color:var(--fg2);font-size:12px">P99</span><div class="value" style="font-size:20px">${m.p99Latency1m.toFixed(0)}ms</div></div>
    </div>
  </div>`).join("");
}

function renderMetricCharts() {
  // This would require historical data; for now just show a placeholder
  const container = document.getElementById("metrics-charts");
  container.innerHTML = '<div class="card" style="grid-column:1/-1"><h3>Real-time metrics</h3><p style="color:var(--fg2)">Historical chart data requires persistent storage. Metrics update every 2s in the cards above.</p></div>';
}

// ─── Errors ──────────────────────────────────────────────
let errorChartInstance = null;

async function loadErrors() {
  const data = await apiFetch("/errors");
  if (!data) return;
  const list = document.getElementById("error-list");
  const summary = document.getElementById("error-summary");

  const byFunction = {};
  for (const e of data.errors) {
    byFunction[e.name] = (byFunction[e.name] || 0) + 1;
  }
  const topErrors = Object.entries(byFunction).sort((a, b) => b[1] - a[1]).slice(0, 5);

  summary.innerHTML = `
    <div class="card"><h3>Total Errors</h3><div class="value" style="color:var(--red)">${data.errors.length}</div></div>
    <div class="card"><h3>Affected Functions</h3><div class="value">${Object.keys(byFunction).length}</div></div>
    <div class="card"><h3>Top Error</h3><div class="value" style="font-size:16px">${topErrors.length ? escapeHtml(topErrors[0][0]) + ' <span style="font-size:14px;color:var(--fg2)">(' + topErrors[0][1] + ')</span>' : '—'}</div></div>
  `;

  list.innerHTML = data.errors.length === 0
    ? '<div class="empty-state">No errors in recent window.</div>'
    : data.errors.map(e => `<div class="log-entry" onclick="showRequestModal('${escapeHtml(e.requestId)}')">
      <div class="flex" style="justify-content:space-between">
        <div class="flex">
          <span class="time">${new Date(e.timestamp).toLocaleTimeString()}</span>
          <span class="badge ${e.type}">${e.type}</span>
          <strong class="truncate">${escapeHtml(e.name)}</strong>
          <span class="pill">${timeAgo(e.timestamp)}</span>
        </div>
        <span class="request-id">${e.requestId.slice(0, 8)}…</span>
      </div>
      <div class="error-line">${escapeHtml((e.error || "Unknown error").slice(0, 300))}</div>
    </div>`).join("");
}

function renderErrorChart() {
  const canvas = document.getElementById("errorFreqChart");
  if (!canvas) return;
  if (errorChartInstance) errorChartInstance.destroy();

  // Bucket errors by 5-min intervals over the last hour
  const now = Date.now();
  const buckets = [];
  for (let i = 11; i >= 0; i--) {
    const start = now - (i + 1) * 5 * 60 * 1000;
    const end = now - i * 5 * 60 * 1000;
    const count = logsData.filter(l =>
      l.status === "error" &&
      new Date(l.timestamp).getTime() >= start &&
      new Date(l.timestamp).getTime() < end
    ).length;
    buckets.push({ label: `${-i * 5}m`, count });
  }

  errorChartInstance = new Chart(canvas, {
    type: "bar",
    data: {
      labels: buckets.map(b => b.label),
      datasets: [{
        label: "Errors",
        data: buckets.map(b => b.count),
        backgroundColor: "rgba(239, 68, 68, 0.6)",
        borderColor: "#ef4444",
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: "#94a3b8" }, grid: { color: "#334155" } },
        y: { beginAtZero: true, ticks: { color: "#94a3b8", stepSize: 1 }, grid: { color: "#334155" } }
      }
    }
  });
}

// ─── Polling ─────────────────────────────────────────────
setInterval(() => {
  const active = document.querySelector(".page.active");
  if (active) {
    const id = active.id;
    if (id === "page-logs") loadLogs();
    if (id === "page-metrics") loadMetrics();
    if (id === "page-errors") { loadErrors(); renderErrorChart(); }
  }
}, 3000);

// ─── Init ───────────────────────────────────────────────
loadLogs();
</script>
</body>
